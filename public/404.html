<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Page Not Found | Latent</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
            background-color: #f8f9fa;
            color: #333;
            line-height: 1.6;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            text-align: center;
            max-width: 600px;
            padding: 40px;
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        .error-code {
            font-size: 120px;
            font-weight: bold;
            color: #2563eb;
            line-height: 1;
            margin-bottom: 20px;
        }

        h1 {
            font-size: 24px;
            margin-bottom: 16px;
            color: #1f2937;
        }

        p {
            color: #6b7280;
            margin-bottom: 32px;
        }

        .button {
            display: inline-block;
            padding: 12px 24px;
            background-color: #2563eb;
            color: white;
            text-decoration: none;
            border-radius: 6px;
            font-weight: 500;
            transition: background-color 0.2s;
        }

        .button:hover {
            background-color: #1d4ed8;
        }

        .home-link {
            margin-top: 20px;
            color: #6b7280;
            text-decoration: none;
        }

        .home-link:hover {
            color: #2563eb;
        }

        @media (max-width: 640px) {
            .container {
                padding: 20px;
            }

            .error-code {
                font-size: 80px;
            }

            h1 {
                font-size: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="error-code">404</div>
        <h1>Page Not Found</h1>
        <p>Sorry, we couldn't find the page you're looking for. The page might have been moved, deleted, or never existed.</p>
        <a href="/" class="button">Go to Homepage</a>
        <div style="margin-top: 20px;">
            <a href="javascript:history.back()" class="home-link">← Go Back</a>
        </div>
    </div>
</body>
</html>
